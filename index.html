<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TGSRTC BUS PASS</title>
  </head>

  <body>
    <div>
      <form action="./Welcome.html">
        <center>
          <img
            src="https://www.shutterstock.com/image-vector/bus-travel-ticket-vector-flat-600nw-565095238.jpg"
            alt="BusLogo"
            width="80"
            height="60"
          />
          <h2>TELANGANA STATE ROAD TRANSPORTATION CORPORATION</h2>
          <h2>GENERAL BUS PASS APPLICATION</h2>

          <table width="65%">
            <tr>
              <td>
                <fieldset>
                  <legend>Applicant Details</legend>
                  <br />

                  <label for="name"
                    >Name : &emsp;&emsp;&emsp;&emsp;&emsp;</label
                  >
                  <input
                    type="text"
                    name="Name"
                    id="name"
                    minlength="8"
                    maxlength="20"
                    required
                  />

                  &emsp;&emsp;&emsp;&emsp;

                  <label for="fname">Father's / Guardian's Name : &emsp;</label>
                  <input
                    type="text"
                    name="fname"
                    id="fname"
                    required
                  /><br /><br />

                  <label for="DOB">Date of birth : &emsp;&emsp;</label>
                  <input type="date" name="DateOfBirth" id="DOB" required />

                  &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;

                  <label for="gender"
                    >Gender :
                    &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;</label
                  >
                  <label for="male">Male</label>
                  <input type="radio" name="gender" id="male" />
                  &emsp;
                  <label for="female">Female</label>
                  <input type="radio" name="gender" id="female" /><br /><br />

                  <label for="Age">Age as on : &emsp;&emsp;&emsp;</label>
                  <input type="number" name="age" id="Age" required />

                  &emsp;&emsp;&emsp;&emsp;

                  <label for="aadhar"
                    >Aadhar number : &emsp;&emsp;&emsp;&emsp;&emsp;</label
                  >
                  <input
                    type="tel"
                    name="aadhar"
                    id="aadhar"
                    minlength="12"
                    maxlength="12"
                    required
                  /><br /><br />

                  <label for="number">WhatsApp No : &emsp;</label>
                  <input type="tel" name="number" id="number" required />

                  &emsp;&emsp;&emsp;&emsp;

                  <label for="email"
                    >E-mail Id :
                    &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;</label
                  >
                  <input
                    type="email"
                    name="email"
                    id="email"
                    required
                  /><br /><br />

                  <label for="photo">Photo : &emsp;&emsp;&emsp;&emsp;</label>
                  <input
                    type="file"
                    name=""
                    id=""
                    required
                    accept=".png, .jpg, .jpeg"
                  />
                </fieldset>
              </td>
            </tr>
            <tr>
              <td>
                <fieldset>
                  <legend>Residential Address Details</legend>
                  <br />
                  <label for="Address">Applicant's Address : &emsp;</label>
                  <textarea
                    name="Address"
                    id="Address"
                    cols="20"
                    rows="5"
                    placeholder="Enter your address"
                    maxlength="100"
                    required
                  ></textarea>

                  &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;

                  <label for="district">District : &emsp;&emsp;</label>
                  <select name="district" id="district" required>
                    <option value="HYDERABAD">HYDERABAD</option>
                    <option value="RANGAREDDY">RANGAREDDY</option>
                    <option value="WARANGAL">WARANGAL</option>
                    <option value="Select" disabled selected hidden>
                      Select
                    </option></select
                  ><br /><br />

                  <label for="mandal"
                    >Mandal : &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;</label
                  >
                  <select name="mandal" id="mandal" required>
                    <option value="HYDERABAD">HYDERABAD</option>
                    <option value="RANGAREDDY">RANGAREDDY</option>
                    <option value="WARANGAL">WARANGAL</option>
                    <option value="Select" disabled selected hidden>
                      Select
                    </option>
                  </select>

                  &emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&emsp;&nbsp;

                  <label for="village">Village : &emsp;&emsp;</label>
                  <select name="village" id="village" required>
                    <option value="HYDERABAD">HYDERABAD</option>
                    <option value="RANGAREDDY">RANGAREDDY</option>
                    <option value="WARANGAL">WARANGAL</option>
                    <option value="Select" disabled selected hidden>
                      Select
                    </option></select
                  ><br /><br />

                  <label for="pincode"
                    >Pincode : &emsp;&emsp;&emsp;&emsp;&emsp;</label
                  >
                  <input
                    type="tel"
                    name="pincode"
                    id="pincode"
                    required
                    maxlength="10"
                  />
                </fieldset>
              </td>
            </tr>
            <tr>
              <td>
                <fieldset>
                  <legend>Pass Type Details</legend>
                  <br />
                  <label for="city">City : &emsp;&emsp;&emsp;&emsp;</label>
                  <select name="city" id="city" required>
                    <option value="HYDERABAD">HYDERABAD</option>
                    <option value="RANGAREDDY">RANGAREDDY</option>
                    <option value="WARANGAL">WARANGAL</option>
                    <option value="Select" disabled selected hidden>
                      Select
                    </option></select
                  ><br /><br />

                  <label for="passtype">Pass Type : &emsp;&emsp;</label>
                  <select name="passtype" id="passtype" required>
                    <option value="GREATER PASS">GREATER PASS</option>
                    <option value="GENERAL ORDINARY ROUTE PASS MTLY">
                      GENERAL ORDINARY ROUTE PASS MTLY
                    </option>
                    <option value="GENERAL METRO EXPRESS ROUTE PASS MTLY">
                      GENERAL METRO EXPRESS ROUTE PASS MTLY
                    </option>
                    <option value="ORDINARY PASS">ORDINARY PASS</option>
                    <option value="METRO EXPRESS PASS">
                      METRO EXPRESS PASS
                    </option>
                    <option value="METRO DELUXE PASS">METRO DELUXE PASS</option>
                    <option value="select" hidden selected>Select</option>
                  </select>
                </fieldset>
              </td>
            </tr>
            <tr>
              <td>
                <fieldset>
                  <legend>Mode of Payment & Pass Collection</legend>
                  <br />
                  <label for="paymentmode"
                    >Payment Mode : &emsp;&emsp;&emsp;&emsp;</label
                  >
                  <select name="paymentmode" id="paymentmode" required>
                    <option value="Select payment mode" hidden selected>
                      Select payment mode
                    </option>
                    <option value="Payment at Counter">
                      Payment at Counter
                    </option>
                    <option value="UPI">UPI</option>
                    <option value="Net Banking">Net Banking</option></select
                  ><br /><br />

                  <label for="passdeliverymode"
                    >Pass Delivery Mode : &emsp;&emsp;</label
                  >
                  <select
                    name="passdeliverymode"
                    id="passdeliverymode"
                    required
                  >
                    <option value="Select Pass Delivery Mode" hidden selected>
                      Select Pass Delivery Mode
                    </option>
                    <option value="At Counter">At Counter</option>
                    <option value="Via Post">Via Post</option></select
                  ><br /><br />

                  <label for="center"
                    >Center at which you want to Collect the Pass :
                    &emsp;</label
                  >
                  <select name="center" id="center" required>
                    <option value="Select a Center" hidden selected>
                      Select a Center
                    </option>
                    <option value="RTC ABIDS - HYDERABAD">
                      RTC ABIDS - HYDERABAD
                    </option>
                    <option value="RTC UPPAL - HYDERABAD">
                      RTC UPPAL - HYDERABAD
                    </option>
                    <option value="RTC UPPAL - HYDERABAD">
                      RTC KOTI - HYDERABAD
                    </option>
                    <option value="select" hidden selected>---Select---</option>
                  </select>
                </fieldset>
              </td>
            </tr>
          </table>
          <img
            src="https://user-images.githubusercontent.com/25476729/63083566-a8bc6880-bf66-11e9-82cc-9609c2fd8929.png"
            alt="mycaptcha"
            width="250"
            height="150"
          /><br /><br />
          <label for="">Captcha : &emsp;</label>
          <input
            type="text"
            name="captcha"
            id="captcha"
          /><br /><br />
          <button>Submit</button>
        </center>
      </form>
    </div>
  </body>
</html>
